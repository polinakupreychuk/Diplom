sonar.projectKey=polinakupreychuk_Diplom
sonar.organization=polinakupreychuk
sonar.projectName=Media Data Analysis Platform
sonar.projectVersion=0.1.0

# Source code
sonar.sources=app,components,lib
sonar.tests=tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/public/**,**/*.config.*,**/*.d.ts
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/tests/**,**/*.config.*

# Coverage reports (lcov format from Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# TypeScript config
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8